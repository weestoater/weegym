<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#0d6efd"/>
  
  <!-- Dumbbell design -->
  <g fill="#ffffff">
    <!-- Left weight -->
    <rect x="60" y="200" width="60" height="112" rx="8"/>
    <rect x="40" y="220" width="20" height="72" rx="4"/>
    
    <!-- Right weight -->
    <rect x="392" y="200" width="60" height="112" rx="8"/>
    <rect x="452" y="220" width="20" height="72" rx="4"/>
    
    <!-- Bar -->
    <rect x="120" y="244" width="272" height="24" rx="12"/>
    
    <!-- "W" letter overlay (optional, can remove if too busy) -->
    <text x="256" y="420" font-family="Arial, sans-serif" font-size="120" font-weight="bold" text-anchor="middle" fill="#ffffff" opacity="0.3">W</text>
  </g>
</svg>
